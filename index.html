
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Silquess Links</title>
  <style>
    body {
      font-family: 'Helvetica Neue', sans-serif;
      background-color: #f5f1ec;
      color: #1a1a1a;
      text-align: center;
      padding: 40px 20px;
    }
    .logo {
      width: 120px;
      margin-bottom: 20px;
      border-radius: 50%;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    p {
      font-size: 16px;
      margin-bottom: 30px;
    }
    .link-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 400px;
      margin: 0 auto;
    }
    a.link {
      background-color: #1a1a1a;
      color: #fff;
      text-decoration: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      transition: background-color 0.3s;
    }
    a.link:hover {
      background-color: #333;
    }
  </style>
</head>
<body>
  <img src="silquess-instagram-logo.png" alt="Silquess Logo" class="logo" />
  <h1>Welcome to Silquess</h1>
  <p>Refined fashion for modern minimalists. Join the journey.</p>

  <div class="link-container">
    <a href="https://forms.gle/your-waitlist-link" class="link" target="_blank">Join Our Waitlist</a>
    <a href="https://silquess.com/lookbook" class="link" target="_blank">View Digital Lookbook</a>
    <a href="mailto:hello.silquess@gmail.com" class="link">Email Us</a>
    <a href="https://instagram.com/silquess" class="link" target="_blank">Follow on Instagram</a>
    <a href="https://tiktok.com/@silquess" class="link" target="_blank">Follow on TikTok</a>
  </div>
</body>
</html>
